{% extends "base.html" %}

{% block content %}
<div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">{{ t.users_title }}</h1>
        <p id="users-count-text" class="mt-1 text-sm text-gray-500 dark:text-gray-400">Yuklanmoqda...</p>
    </div>
    <a href="/users/add" class="inline-flex items-center gap-2 rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5 hover:bg-blue-700">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        {{ t.add_user }}
    </a>
</div>

<div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm dark:border-gray-800 dark:bg-gray-900">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="border-b border-gray-200 bg-gray-50 text-xs uppercase tracking-wider text-gray-500 dark:border-gray-800 dark:bg-gray-800/50 dark:text-gray-400">
                    <th class="px-5 py-3 font-medium">#</th>
                    <th class="px-5 py-3 font-medium">F.I.O</th>
                    <th class="px-5 py-3 font-medium">Username</th>
                    <th class="px-5 py-3 font-medium">Otasining ismi</th>
                    <th class="px-5 py-3 font-medium">{{ t.email }}</th>
                    <th class="px-5 py-3 font-medium">Telefon</th>
                    <th class="px-5 py-3 font-medium">{{ t.role }}</th>
                    <th class="px-5 py-3 font-medium">{{ t.organization }}</th>
                    <th class="px-5 py-3 font-medium text-right">{{ t.actions }}</th>
                </tr>
            </thead>
            <tbody id="user-table-body" class="divide-y divide-gray-100 text-sm dark:divide-gray-800"></tbody>
        </table>
    </div>
    <div id="empty-state" class="hidden py-12 text-center text-gray-500 dark:text-gray-400">
        {{ t.no_users }}
    </div>
    <div class="flex flex-col items-center justify-between gap-3 border-t border-gray-100 px-5 py-4 dark:border-gray-800 sm:flex-row">
        <p id="users-page-info" class="text-xs text-gray-500 dark:text-gray-400">1 / 1</p>
        <div class="inline-flex items-center gap-2">
            <button id="users-prev-page" class="rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700">Oldingi</button>
            <button id="users-next-page" class="rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700">Keyingi</button>
        </div>
    </div>
</div>

<script>
const tEdit = "{{ t.edit }}";
const tDelete = "{{ t.delete }}";
const rolesMapping = {
    "SuperAdmin": "{{ t.super_admin }}",
    "MahallaAdmin": "{{ t.mahalla_admin }}",
    "MaktabAdmin": "{{ t.maktab_admin }}",
    "KollejAdmin": "{{ t.kollej_admin }}",
    "TashkilotAdmin": "{{ t.tashkilot_admin }}",
    "KorxonaAdmin": "{{ t.korxona_admin }}"
};

const usersState = {
    all: [],
    page: 1,
    pageSize: 50,
    totalPages: 1,
};

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function fullName(user) {
    const first = String(user.first_name || "").trim();
    const last = String(user.last_name || "").trim();
    const byParts = `${first} ${last}`.trim();
    if (byParts) return byParts;
    return String(user.name || "-").trim() || "-";
}

function userInitial(user) {
    const name = fullName(user);
    return name && name !== "-" ? name[0].toUpperCase() : "U";
}

function renderUsersPagination() {
    const total = usersState.all.length;
    usersState.totalPages = Math.max(1, Math.ceil(total / usersState.pageSize));
    if (usersState.page > usersState.totalPages) {
        usersState.page = usersState.totalPages;
    }
    document.getElementById("users-page-info").textContent = `${usersState.page} / ${usersState.totalPages} (jami: ${total})`;
    document.getElementById("users-prev-page").disabled = usersState.page <= 1;
    document.getElementById("users-next-page").disabled = usersState.page >= usersState.totalPages;
    document.getElementById("users-count-text").textContent = `${total} ta foydalanuvchi`;
}

function renderTable() {
    const tbody = document.getElementById("user-table-body");
    const empty = document.getElementById("empty-state");

    renderUsersPagination();

    if (!usersState.all.length) {
        tbody.innerHTML = "";
        empty.classList.remove("hidden");
        return;
    }
    empty.classList.add("hidden");

    const start = (usersState.page - 1) * usersState.pageSize;
    const rows = usersState.all.slice(start, start + usersState.pageSize);
    tbody.innerHTML = rows.map((u, index) => {
        const rowNo = start + index + 1;
        const nameText = escapeHtml(fullName(u));
        const username = escapeHtml(String(u.name || "-"));
        const middleName = escapeHtml(String(u.middle_name || "-"));
        const orgNames = Array.isArray(u.organization_names) ? u.organization_names.filter(Boolean) : [];
        const orgText = orgNames.length ? orgNames.join(", ") : (u.organization_name || "-");
        const avatar = u.image_url ? `
            <img src="${escapeHtml(u.image_url)}" alt="avatar" class="h-10 w-10 rounded-full border border-gray-200 object-cover dark:border-gray-700">
        ` : `
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 text-sm font-bold text-white">
                ${escapeHtml(userInitial(u))}
            </div>
        `;

        return `
            <tr class="transition hover:bg-gray-50 dark:hover:bg-gray-800/50">
                <td class="px-5 py-4 whitespace-nowrap font-medium text-gray-600 dark:text-gray-300">${rowNo}</td>
                <td class="px-5 py-4 whitespace-nowrap">
                    <div class="flex items-center gap-3">
                        ${avatar}
                        <div>
                            <div class="font-medium text-gray-900 dark:text-white">${nameText}</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400">ID: ${escapeHtml(u.id)}</div>
                        </div>
                    </div>
                </td>
                <td class="px-5 py-4 whitespace-nowrap text-gray-700 dark:text-gray-300">${username}</td>
                <td class="px-5 py-4 whitespace-nowrap text-gray-700 dark:text-gray-300">${middleName}</td>
                <td class="px-5 py-4 whitespace-nowrap text-gray-700 dark:text-gray-300">${escapeHtml(u.email || "-")}</td>
                <td class="px-5 py-4 whitespace-nowrap text-gray-700 dark:text-gray-300">${escapeHtml(u.phone || "-")}</td>
                <td class="px-5 py-4 whitespace-nowrap">
                    <span class="inline-flex items-center rounded-full border border-blue-200 bg-blue-100 px-2.5 py-0.5 text-xs font-medium text-blue-800 dark:border-blue-800 dark:bg-blue-900/30 dark:text-blue-300">
                        ${escapeHtml(rolesMapping[u.role] || u.role || "-")}
                    </span>
                </td>
                <td class="px-5 py-4 text-gray-500 dark:text-gray-400">${escapeHtml(orgText)}</td>
                <td class="px-5 py-4 whitespace-nowrap text-right text-sm font-medium">
                    <div class="flex items-center justify-end gap-2">
                        <a href="/users/${u.id}/edit" title="${tEdit}" aria-label="${tEdit}" class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-blue-50 text-blue-600 transition-colors hover:bg-blue-100 dark:bg-blue-500/10 dark:text-blue-400 dark:hover:bg-blue-500/20">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        </a>
                        <button onclick="deleteUser(${u.id})" title="${tDelete}" aria-label="${tDelete}" class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-red-50 text-red-600 transition-colors hover:bg-red-100 dark:bg-red-500/10 dark:text-red-400 dark:hover:bg-red-500/20">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
        `;
    }).join("");
}

async function loadUsers() {
    try {
        const res = await fetch("/api/users");
        const data = await res.json().catch(() => []);
        usersState.all = Array.isArray(data) ? data : [];
        usersState.page = 1;
        renderTable();
    } catch (e) {
        console.error("Users load xatoligi", e);
    }
}

async function deleteUser(id) {
    const confirmed = window.AppDialog
        ? await window.AppDialog.confirm({
            title: "Foydalanuvchini o'chirish",
            message: "Haqiqatan ham ushbu foydalanuvchini o'chirmoqchimisiz?",
            tone: "danger",
            confirmText: "O'chirish",
            cancelText: "Bekor qilish",
        })
        : confirm("Haqiqatan ham o'chirmoqchimisiz?");
    if (!confirmed) return;
    try {
        const res = await fetch(`/api/users/${id}`, { method: "DELETE" });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            if (window.AppNotify) {
                window.AppNotify.error(data.detail || "O'chirishda xatolik");
            }
            return;
        }
        if (window.AppNotify) {
            window.AppNotify.success("Foydalanuvchi o'chirildi");
        }
        await loadUsers();
    } catch (e) {
        console.error("Delete user xatoligi", e);
        if (window.AppNotify) {
            window.AppNotify.error("Foydalanuvchini o'chirishda xatolik");
        }
    }
}

document.getElementById("users-prev-page").addEventListener("click", () => {
    if (usersState.page <= 1) return;
    usersState.page -= 1;
    renderTable();
});
document.getElementById("users-next-page").addEventListener("click", () => {
    if (usersState.page >= usersState.totalPages) return;
    usersState.page += 1;
    renderTable();
});

document.addEventListener("DOMContentLoaded", loadUsers);
</script>
{% endblock %}
