<!DOCTYPE html>
<html lang="uz" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} — {{ menus.app_name|default('BioFace') }}</title>
    {% if menus.favicon_url %}
    <link rel="icon" href="{{ menus.favicon_url }}" />
    {% endif %}
    <link href="/static/css/output.css?v=20260317c" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .card-hover { transition: box-shadow .2s, transform .2s; }
        .card-hover:hover { box-shadow: 0 10px 30px -5px rgba(0,0,0,.1); transform: translateY(-2px); }
        .glass { background: rgba(255,255,255,.15); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.2); }
        #sidebar { transition: transform .25s ease; }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var path = window.location.pathname;
            document.querySelectorAll('#sidebar ul li a').forEach(function(link) {
                var href = link.getAttribute('href');
                if (href !== '/' && path.startsWith(href) || href === '/' && path === '/') {
                    link.classList.add('bg-blue-50', 'text-blue-700', '!text-blue-700', 'dark:bg-blue-900/30', 'dark:text-blue-400', 'font-semibold');
                    link.querySelectorAll('svg').forEach(s => s.classList.add('text-blue-600', 'dark:text-blue-400'));
                }
            });
        });
    </script>
</head>
<body class="bg-slate-50 dark:bg-gray-950 flex h-screen overflow-hidden font-sans antialiased">
    
    <!-- Global Page Loader -->
    <div id="page-loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-50 dark:bg-gray-950 transition-opacity duration-300">
        <div class="flex flex-col items-center gap-3">
            <svg class="w-10 h-10 animate-spin text-blue-600 dark:text-blue-500" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Yuklanmoqda...</p>
        </div>
    </div>

    <!-- ── Sidebar ── -->
    {% include "components/sidebar.html" %}

    <!-- ── Content Wrapper ── -->
    <div class="flex-1 flex flex-col min-h-screen overflow-hidden">
        {% include "components/navbar.html" %}

        <!-- ── Main Content ── -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden p-4 sm:p-6 transition-all duration-300">
            <div class="max-w-screen-2xl mx-auto animate-[fadeIn_.35s_ease_both]">
                {% block content %}{% endblock %}
            </div>

            <!-- Footer -->
            <footer class="mt-8 pb-4 text-center text-xs text-gray-400 dark:text-gray-600">
                {{ menus.app_name|default('BioFace') }} &copy; 2026
            </footer>
        </main>
    </div>

    <script src="/static/js/flowbite.min.js"></script>
    <script>
        // Hide loader when page is fully loaded
        window.addEventListener('load', function() {
            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 300); // Wait for transition
        });

        // Show loader before navigating away
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a');
            // Only trigger on internal links that aren't # hashes or targets
            if (link && link.href && link.href.startsWith(window.location.origin) && !link.href.includes('#') && link.target !== '_blank') {
                e.preventDefault();
                const loader = document.getElementById('page-loader');
                loader.style.display = 'flex';
                // Small timeout to allow display:flex to apply before animating opacity
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        loader.style.opacity = '1';
                    });
                });
                setTimeout(() => window.location.href = link.href, 150);
            }
        });
    </script>
</body>
</html>
